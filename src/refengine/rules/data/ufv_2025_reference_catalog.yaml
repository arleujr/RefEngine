general_rules:
- id: GEN-001
  category: data_source
  statement: Os elementos essenciais e complementares devem refletir os dados do documento consultado.
  section: '5.1'
  page: 54
- id: GEN-002
  category: data_source
  statement: Quando um dado não existir no documento, outra fonte pode ser usada e o dado acrescentado deve ser
    indicado entre colchetes.
  section: '5.1'
  page: 54
- id: GEN-003
  category: presentation
  statement: Os elementos devem ser apresentados em sequência padronizada.
  section: '5.3'
  page: 55
- id: GEN-004
  category: presentation
  statement: A lista deve usar espaço simples, alinhamento à esquerda e uma linha em branco simples entre referências.
  section: '5.3'
  page: 55
- id: GEN-005
  category: presentation
  statement: A pontuação deve ser uniforme em todas as referências.
  section: '5.3'
  page: 55
- id: GEN-006
  category: presentation
  statement: O recurso tipográfico usado para destacar o título deve ser uniforme em toda a lista.
  section: '5.3'
  page: 56
- id: GEN-007
  category: complementary_elements
  statement: Ao adotar elementos complementares, eles devem ser incluídos de modo uniforme nas referências do mesmo
    tipo.
  section: '5.3'
  page: 56
- id: GEN-008
  category: online
  statement: Documentos online devem terminar com Disponível em e Acesso em.
  section: '5.10'
  page: 79
- id: GEN-009
  category: ordering
  statement: No sistema alfabético, as referências devem ser ordenadas alfabeticamente pelo elemento de entrada;
    numerais seguem ordem crescente.
  section: 5.11.1
  page: 79
- id: AUT-001
  category: authorship
  statement: Pessoa física entra pelo último sobrenome em maiúsculas, seguido do prenome e demais sobrenomes, abreviados
    ou não conforme o documento.
  section: 5.4.1.1
  page: 56
- id: AUT-002
  category: authorship
  statement: Autores são separados por ponto e vírgula seguido de espaço.
  section: 5.4.1.1
  page: 57
- id: AUT-003
  category: authorship
  statement: Até três autores devem ser todos indicados.
  section: 5.4.1.1
  page: 57
- id: AUT-004
  category: authorship
  statement: Com quatro ou mais autores, convém indicar todos; é permitido indicar o primeiro seguido de et al.
  section: 5.4.1.1
  page: 57
- id: AUT-005
  category: authorship
  statement: Sobrenomes de parentesco como Júnior, Sobrinho, Filho e Neto permanecem ligados ao sobrenome anterior.
  section: 5.4.1.1
  page: 58
- id: AUT-006
  category: authorship
  statement: Sobrenomes hispânicos, compostos e com prefixos devem preservar a forma bibliográfica mostrada no manual.
  section: 5.4.1.1
  page: 58
- id: AUT-007
  category: authorship
  statement: Responsabilidade por coletânea é indicada após o último responsável, em abreviação minúscula e singular
    entre parênteses.
  section: 5.4.1.1
  page: 58
- id: AUT-008
  category: authorship
  statement: Quando a autoria for desconhecida, a entrada é feita pelo título; não se usa Anônimo ou Autor desconhecido.
  section: 5.4.1.4
  page: 63
- id: AUT-009
  category: corporate_author
  statement: Pessoa jurídica entra pela forma conhecida ou destacada no documento, por extenso ou abreviada.
  section: 5.4.1.2
  page: 60
- id: AUT-010
  category: corporate_author
  statement: Órgão da administração direta deve ser precedido pelo órgão superior ou pela jurisdição correspondente.
  section: 5.4.1.2
  page: 61
- id: EVT-001
  category: event_entry
  statement: Obras de eventos entram pelo nome do evento em maiúsculas, seguido de número, ano e local de realização.
  section: 5.4.1.3
  page: 62
- id: TTL-001
  category: title
  statement: Título e subtítulo são reproduzidos como aparecem no documento e separados por dois pontos.
  section: 5.4.1.5
  page: 63
- id: TTL-002
  category: title
  statement: Entrada pelo título iniciada por artigo deve grafar em maiúsculas o artigo e a palavra seguinte.
  section: 5.4.1.5
  page: 63
- id: TTL-003
  category: title
  statement: Título longo pode ser abreviado no final com reticências entre colchetes, sem alterar o sentido.
  section: 5.4.1.5
  page: 64
- id: TTL-004
  category: title
  statement: Quando não houver título, deve-se atribuir denominação entre colchetes; em obra de arte, usa-se [Sem
    título].
  section: 5.4.1.5
  page: 65
- id: EDI-001
  category: edition
  statement: A edição é transcrita com numeral ordinal e abreviação de edição no idioma do documento.
  section: 5.4.2
  page: 65
- id: EDI-002
  category: edition
  statement: Versão de documento eletrônico equivale ao elemento edição.
  section: 5.4.2
  page: 66
- id: LOC-001
  category: place
  statement: O local é indicado como consta no documento; cidade homônima recebe estado ou país.
  section: 5.4.3
  page: 66
- id: LOC-002
  category: place
  statement: Local identificado fora do documento é indicado entre colchetes; local não identificado usa [S. l.].
  section: 5.4.3
  page: 67
- id: PUB-001
  category: publisher
  statement: O nome da editora é transcrito como aparece, suprimindo palavras de natureza jurídica ou comercial.
  section: 5.4.4
  page: 68
- id: PUB-002
  category: publisher
  statement: 'Editora não identificada usa [s. n.]; local e editora não identificados usam [S. l.: s. n.].'
  section: 5.4.4
  page: 69
- id: DAT-001
  category: date
  statement: O ano de publicação é indicado em algarismos arábicos.
  section: 5.4.5
  page: 70
- id: DAT-002
  category: date
  statement: Na ausência de ano, usa-se copirraite, distribuição ou impressão; estimativas são indicadas entre colchetes.
  section: 5.4.5
  page: 70
- id: DAT-003
  category: date
  statement: O mês antecede o ano e é abreviado no idioma original da publicação.
  section: 5.4.5
  page: 71
- id: DAT-004
  category: date
  statement: Período com mais de um mês ou estação é indicado pelo início e fim separados por barra.
  section: 5.4.5
  page: 72
- id: PHY-001
  category: physical_description
  statement: A quantidade de unidades físicas é seguida da designação específica e pode incluir detalhes entre parênteses.
  section: 5.5.1
  page: 72
- id: PHY-002
  category: physical_description
  statement: Parte de publicação usa página ou folha inicial-final; volume é indicado quando necessário.
  section: 5.5.2
  page: 74
- id: ELE-001
  category: electronic
  statement: Recomenda-se indicar o tipo de suporte ou meio eletrônico.
  section: 5.5.3
  page: 75
